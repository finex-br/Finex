<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message">
        <h2>🔐 Processing OAuth Login...</h2>
        <div class="spinner"></div>
        <p>Please wait while we complete your authentication.</p>
    </div>

    <script>
        // Extract OAuth callback parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        if (error) {
            document.querySelector('.message').innerHTML = `
                <h2>❌ Authentication Error</h2>
                <p>${error}</p>
                <p style="font-size: 0.9rem; opacity: 0.8;">This window will close in 3 seconds...</p>
            `;
            setTimeout(() => window.close(), 3000);
        } else if (code && state) {
            // Send the code back to the opener window
            if (window.opener) {
                window.opener.postMessage({
                    type: 'oauth-success',
                    code: code,
                    state: state
                }, window.location.origin);
                
                document.querySelector('.message').innerHTML = `
                    <h2>✅ Success!</h2>
                    <p>Authentication successful.</p>
                    <p style="font-size: 0.9rem; opacity: 0.8;">This window will close automatically...</p>
                `;
                
                setTimeout(() => window.close(), 1500);
            } else {
                document.querySelector('.message').innerHTML = `
                    <h2>⚠️ Warning</h2>
                    <p>Could not communicate with parent window.</p>
                    <p>Please close this window and try again.</p>
                `;
            }
        } else {
            document.querySelector('.message').innerHTML = `
                <h2>⚠️ Invalid Callback</h2>
                <p>Missing required parameters.</p>
                <p style="font-size: 0.9rem; opacity: 0.8;">This window will close in 3 seconds...</p>
            `;
            setTimeout(() => window.close(), 3000);
        }
    </script>
</body>
</html>
