version: '3.8'

networks:
  coolify:
    external: true

services:
  # --- Database ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-finex}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-finex}
    volumes:
      - postgres_data_prod_v4:/var/lib/postgresql/data  # Mudei para v4 (Reset de senha)
    networks:
      - default
    restart: always

  # --- Cache ---
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    networks:
      - default
    restart: always

  # --- Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${DB_USER:-finex}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-finex}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      GOOGLE_CALLBACK_URL: ${API_URL}/auth/oauth/google/callback
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - coolify   # Conecta no roteador (Resolve o 503 da API se tiver)
    restart: always

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_APP_URL: ${FRONTEND_URL}
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - default
      - coolify   # Conecta no roteador (Resolve o 503 do Site)

volumes:
  postgres_data_prod_v4:
  redis_data_prod: