version: '3.8'

networks:
  coolify:
    external: true

services:
  # --- Database ---
  postgres:
    image: postgres:15-alpine
    container_name: finex-prod-db
    environment:
      POSTGRES_USER: finex
      POSTGRES_PASSWORD: "SenhaForte123"
      POSTGRES_DB: finex
    volumes:
      - postgres_data_prod_v6:/var/lib/postgresql/data  # <--- MUDEI PARA V6 PARA RESETAR A SENHA
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finex"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # --- Cache ---
  redis:
    image: redis:alpine
    container_name: finex-prod-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    networks:
      - default
    restart: always

  # --- Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finex-prod-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://finex:SenhaForte123@postgres:5432/finex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      GOOGLE_CALLBACK_URL: ${API_URL}/auth/oauth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - coolify
    restart: always

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_APP_URL: ${FRONTEND_URL}
    container_name: finex-prod-frontend
    restart: always
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80" # <--- ISSO RESOLVE O 503
    depends_on:
      - backend
    networks:
      - default
      - coolify

volumes:
  postgres_data_prod_v6: # <--- MUDEI AQUI TAMBÉM
  redis_data_prod: